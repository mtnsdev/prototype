name: CI (Security Gate)

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "release"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # 1. Dependency Review (PR only)
  # ──────────────────────────────────────────────────
  dependency-review:
    name: 🔍 Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@v4

      - name: Skip on non-PR events
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "✅ Skipped (dependency-review runs on pull_request only)"

  # ──────────────────────────────────────────────────
  # 2. Malware Scan (Config Files)
  # ──────────────────────────────────────────────────
  malware-scan:
    name: 🦠 Malware Scan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Config Files for Malware
        run: |
          echo "🔍 Scanning configuration files for malicious code..."
          echo ""

          # Define files to scan
          FILES="postcss.config.mjs next.config.ts eslint.config.mjs"
          
          # Additional config files if they exist
          for f in tailwind.config.* vite.config.* webpack.config.* babel.config.*; do
            if [ -f "$f" ]; then
              FILES="$FILES $f"
            fi
          done

          echo "📝 Files to scan:"
          for f in $FILES; do
            echo "   • $f"
          done
          echo ""

          # Malware patterns to detect
          PATTERNS=(
            # Your original patterns
            "global\['_V'\]"
            "global\.i='[0-9]"
            "lyR\("
            "_\\\$_[a-z0-9]"
            "eval\(atob"
            "fromCharCode\(127\)"
            "oWN\("
            "BfG\("
            
            # Additional obfuscation patterns
            "createRequire"
            "String\.fromCharCode"
            "\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}"
            "\\\\u[0-9a-fA-F]{4}"
            "eval\(.*function.*\(.*\)"
            "Function\(.*return"
            "new Function\("
            "child_process\.exec"
            "exec\(.*require"
            "require\(.*child_process"
            
            # Crypto miner patterns
            "CoinHive"
            "CryptoLoot"
            "miner\.start"
            "\.wasm"
            "WebAssembly"
            "stratum\+tcp"
            "\.pool\."
            
            # Suspicious network requests
            "https\?://.*\.onion"
            "https\?://[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}"
            
            # Token/credential leakage patterns
            "github_pat_"
            "ghp_"
            "sk-or-v1-"
            "eyJhbGciOiJSUzI1NiJ9"
            "-----BEGIN RSA PRIVATE KEY-----"
            "-----BEGIN OPENSSH PRIVATE KEY-----"
          )

          FOUND=false

          for file in $FILES; do
            if [ ! -f "$file" ]; then
              continue
            fi

            for pattern in "${PATTERNS[@]}"; do
              if grep -qE "$pattern" "$file" 2>/dev/null; then
                echo "🚨 MALWARE DETECTED in $file (pattern: $pattern)"
                echo ""
                grep -nE "$pattern" "$file" || true
                echo ""
                FOUND=true
              fi
            done
          done

          if [ "$FOUND" = true ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ MALWARE DETECTED - DEPLOYMENT BLOCKED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ No malware patterns found"
          echo "✅ Scan passed"

  # ──────────────────────────────────────────────────
  # 3. Final Gate (Vercel waits for this)
  # ──────────────────────────────────────────────────
  security-gate:
    name: 🔒 Security Gate
    runs-on: ubuntu-latest
    needs: [dependency-review, malware-scan]
    if: success()
    steps:
      - name: Security Checks Passed
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ ALL SECURITY CHECKS PASSED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Dependency review   ✅"
          echo "🦠 Malware scan        ✅"
          echo ""
          echo "🟢 Vercel deployment authorized"
